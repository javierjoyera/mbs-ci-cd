# GitHub Actions Example 2: Parallelism and Sequencing
# This demonstrates how jobs can run in parallel or sequentially
# and how to control dependencies between jobs

name: 02 - Parallelism and Sequencing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # Job 1: Preparation (runs first)
  preparation:
    runs-on: ubuntu-latest
    outputs:
      # Output that other jobs can use
      timestamp: ${{ steps.timestamp.outputs.timestamp }}
      build-number: ${{ steps.build-number.outputs.build-number }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Generate timestamp
        id: timestamp
        run: echo "timestamp=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
      
      - name: Generate build number
        id: build-number
        run: echo "build-number=${{ github.run_number }}" >> $GITHUB_OUTPUT
      
      - name: Show preparation info
        run: |
          echo "Preparation completed at: ${{ steps.timestamp.outputs.timestamp }}"
          echo "Build number: ${{ steps.build-number.outputs.build-number }}"

  # Job 2: Unit Tests (runs in parallel after preparation)
  unit-tests:
    runs-on: ubuntu-latest
    needs: preparation  # Wait for preparation to complete
    strategy:
      matrix:
        # Run tests on multiple Node.js versions in parallel
        node-version: [16, 18, 20]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Simulate Unit Tests
        run: |
          echo "Running unit tests with Node.js ${{ matrix.node-version }}"
          echo "Build number from preparation: ${{ needs.preparation.outputs.build-number }}"
          sleep 5  # Simulate test execution time
          echo "Unit tests passed! ✅"

  # Job 3: Integration Tests (runs in parallel with unit tests)
  integration-tests:
    runs-on: ubuntu-latest
    needs: preparation
    strategy:
      matrix:
        # Run on different operating systems in parallel
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Simulate Integration Tests
        run: |
          echo "Running integration tests on ${{ matrix.os }}"
          echo "Timestamp from preparation: ${{ needs.preparation.outputs.timestamp }}"
          sleep 8  # Simulate longer test execution
          echo "Integration tests passed! ✅"

  # Job 4: Code Quality Checks (runs in parallel with tests)
  code-quality:
    runs-on: ubuntu-latest
    needs: preparation
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Lint Check
        run: |
          echo "Running linting..."
          sleep 3
          echo "Linting passed! ✅"
      
      - name: Security Scan
        run: |
          echo "Running security scan..."
          sleep 4
          echo "Security scan passed! ✅"
      
      - name: Code Coverage
        run: |
          echo "Checking code coverage..."
          sleep 2
          echo "Code coverage: 95% ✅"

  # Job 5: Build (waits for all parallel jobs to complete)
  build:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, code-quality]  # Wait for ALL to complete
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build Application
        run: |
          echo "All tests and quality checks passed!"
          echo "Building application..."
          sleep 6
          echo "Build completed successfully! 🏗️"
