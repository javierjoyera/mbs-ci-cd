# GitHub Actions Example 3: Conditionals (Simplified)
# This demonstrates basic conditional logic in GitHub Actions

name: 03 - Simple Conditionals

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_tests:
        description: 'Run tests?'
        required: false
        default: true
        type: boolean

jobs:
  # Job 1: Always runs basic checks
  setup:
    runs-on: ubuntu-latest
    outputs:
      is-main-branch: ${{ steps.check-branch.outputs.is-main }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check if main branch
        id: check-branch
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "is-main=true" >> $GITHUB_OUTPUT
            echo "This is the main branch ✅"
          else
            echo "is-main=false" >> $GITHUB_OUTPUT
            echo "This is NOT the main branch"
          fi

  # Job 2: Run tests conditionally
  test:
    runs-on: ubuntu-latest
    needs: setup
    # Only run if tests are enabled (default: true)
    if: ${{ inputs.run_tests != false }}
    
    steps:
      - name: Run Tests
        run: |
          echo "Running tests..."
          sleep 2
          echo "Tests completed! ✅"
      
      # This step only runs on main branch
      - name: Run Extra Tests on Main
        if: ${{ needs.setup.outputs.is-main-branch == 'true' }}
        run: |
          echo "Running additional tests for main branch..."
          echo "Extra tests completed! ✅"

  # Job 3: Build (always runs if setup succeeds)
  build:
    runs-on: ubuntu-latest
    needs: [setup, test]
    # Run if tests passed OR if tests were skipped
    if: ${{ always() && needs.setup.result == 'success' && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    
    steps:
      - name: Build Application
        run: |
          echo "Building application..."
          sleep 3
          echo "Build completed! 🏗️"

  # Job 5: Cleanup (always runs)
  cleanup:
    runs-on: ubuntu-latest
    needs: [setup, test, build]
    if: always()
    
    steps:
      - name: Cleanup
        run: |
          echo "Cleaning up..."
          echo "Setup: ${{ needs.setup.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Cleanup completed! 🧹"
